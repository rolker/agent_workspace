# Inspiration Tracker — Project Registry
#
# Tracked external projects for discovering portable enhancements and patterns.
# Managed by the /inspiration-tracker skill. Add entries here or use
# /inspiration-tracker add to add interactively.
#
# Two project types:
#   fork:        File-level diff for repos with shared structure
#   inspiration: Structured survey + changelog for unrelated projects

projects:
  ros2_agent_workspace:
    type: fork
    repo: rolker/ros2_agent_workspace
    description: Original ROS2 agent workspace this repo was forked from
    domain_patterns:
      - ros2
      - colcon
      - layer
      - overlay
      - gazebo
      - launch
    categories:
      - scripts
      - skills
      - adrs
      - templates
      - knowledge
      - makefile
      - config

  gstack:
    type: inspiration
    repo: garrytan/gstack
    description: Opinionated Claude Code skills framework with role-based slash commands
    # interest_areas tightened 2026-04-19: dropped browser-based QA
    # (gstack domain), de-emphasized release engineering (scale mismatch);
    # added session/context management + agent-user UX patterns to match
    # the workspace's current concerns
    interest_areas:
      - review and QA workflow (multi-role review, adversarial, anti-skip)
      - planning methodology (CEO/eng/design review roles, scope modes)
      - session and context management (/checkpoint, /health, context-save/restore, context rot defense)
      - agent-user UX patterns (CLI-friendly interaction, mode-posture preservation)
      - safety controls (/careful, /freeze, /guard hooks)
      - agent friction reporting (how agents surface workflow friction)

  superpowers:
    type: inspiration
    repo: obra/superpowers
    description: Agentic skills framework and software development methodology
    interest_areas:
      - skills architecture and composability
      - TDD methodology and testing patterns
      - subagent patterns and orchestration
      - development methodology and workflows

  engram:
    type: inspiration
    repo: shiblon/engram
    description: Memory and personality aid for Claude Code — stack-based short-term memory and dump/load portability
    # Added 2026-04-26. Author's own framing emphasizes personality
    # as a context-decay canary. The workspace already has a working
    # auto-memory setup (CLAUDE.md + per-project memory files);
    # interest is in the patterns, not adopting the Go binary.
    # Personality angle is exploratory — user is curious but no
    # commitment to adopt.
    interest_areas:
      - stack-based short-term memory (push/pop for nested brainstorm contexts)
      - personality as context-decay canary (drift signals full context window)
      - multi-layer memory architecture (global vs project, seamless switching)
      - tool-driven memory management (CLI vs file edits during conversation)
      - memory dump/load for cross-machine portability
      - bootstrap UX (single command sets up CLAUDE.md, hooks, gitignore)

