# Inspiration Tracker — Project Registry
#
# Tracked external projects for discovering portable enhancements and patterns.
# Managed by the /inspiration-tracker skill. Add entries here or use
# /inspiration-tracker add to add interactively.
#
# Two project types:
#   fork:        File-level diff for repos with shared structure
#   inspiration: Structured survey + changelog for unrelated projects

projects:
  ros2_agent_workspace:
    type: fork
    repo: rolker/ros2_agent_workspace
    description: Original ROS2 agent workspace this repo was forked from
    domain_patterns:
      - ros2
      - colcon
      - layer
      - overlay
      - gazebo
      - launch
    categories:
      - scripts
      - skills
      - adrs
      - templates
      - knowledge
      - makefile
      - config

  gstack:
    type: inspiration
    repo: garrytan/gstack
    description: Opinionated Claude Code skills framework with role-based slash commands
    # interest_areas tightened 2026-04-19: dropped browser-based QA
    # (gstack domain), de-emphasized release engineering (scale mismatch);
    # added session/context management + agent-user UX patterns to match
    # the workspace's current concerns
    interest_areas:
      - review and QA workflow (multi-role review, adversarial, anti-skip)
      - planning methodology (CEO/eng/design review roles, scope modes)
      - session and context management (/checkpoint, /health, context-save/restore, context rot defense)
      - agent-user UX patterns (CLI-friendly interaction, mode-posture preservation)
      - safety controls (/careful, /freeze, /guard hooks)
      - agent friction reporting (how agents surface workflow friction)

  superpowers:
    type: inspiration
    repo: obra/superpowers
    description: Agentic skills framework and software development methodology
    interest_areas:
      - skills architecture and composability
      - TDD methodology and testing patterns
      - subagent patterns and orchestration
      - development methodology and workflows

  engram:
    type: inspiration
    repo: shiblon/engram
    description: Memory and personality aid for Claude Code — stack-based short-term memory and dump/load portability
    # Added 2026-04-26. Author's own framing emphasizes personality
    # as a context-decay canary. The workspace already has a working
    # auto-memory setup (CLAUDE.md + per-project memory files);
    # interest is in the patterns, not adopting the Go binary.
    # Personality angle is exploratory — user is curious but no
    # commitment to adopt.
    interest_areas:
      - stack-based short-term memory (push/pop for nested brainstorm contexts)
      - personality as context-decay canary (drift signals full context window)
      - multi-layer memory architecture (global vs project, seamless switching)
      - tool-driven memory management (CLI vs file edits during conversation)
      - memory dump/load for cross-machine portability
      - bootstrap UX (single command sets up CLAUDE.md, hooks, gitignore)

  cc-harness-skills:
    type: inspiration
    repo: LearnPrompt/cc-harness-skills
    description: Portable Claude-Code-inspired skills for memory, verification, coordination, and context compression
    # Added 2026-07-14 (emerging-source sweep). Created 2026-04, very
    # active. Strongest interest-area overlap of the sweep; context
    # compression angle feeds the skill-carving/token-reduction roadmap
    # thread (convergent across gstack/superpowers/ros2).
    interest_areas:
      - context compression and token-reduction techniques
      - verification skill patterns (evidence-before-claims)
      - memory management patterns
      - multi-agent coordination skills
      - cross-harness skill portability

  project-codeguard:
    type: inspiration
    repo: cosai-oasis/project-codeguard
    description: Model-agnostic secure-by-default rules framework for AI coding agent workflows (OASIS/CoSAI)
    # Added 2026-07-14 (emerging-source sweep). Standards-body backed;
    # complements the security-review skill and the fail-closed-hook
    # audit roadmap item.
    interest_areas:
      - secure-by-default rule design for agent workflows
      - rule packaging and distribution format
      - integration with review pipelines
      - model-agnostic enforcement mechanisms

  diffx:
    type: inspiration
    repo: wong2/diffx
    description: Local code review tool designed for the coding-agent workflow
    # Added 2026-07-14 (emerging-source sweep). Review-before-push UX
    # for humans supervising agents — adjacent to our review-code /
    # triage-reviews loop and the CLI-first constraint.
    interest_areas:
      - review-before-push workflow integration
      - diff presentation for human supervision of agent output
      - inline commenting and finding-tracking UX
      - staying local-first / terminal-adjacent

  harness-starter-kit:
    type: inspiration
    repo: harnessworks/harness-starter-kit
    description: Prompt-first harness engineering for safer AI coding agent workflows
    # Added 2026-07-14 (emerging-source sweep). Newest of the batch
    # (created 2026-05); watch whether "harness engineering" as a
    # discipline develops enforcement-backed patterns beyond ours.
    interest_areas:
      - enforcement-backed instruction design
      - safety guardrails for agent workflows
      - harness bootstrap / starter-kit UX
      - prompt-engineering-as-configuration patterns

  # --- Watched, not tracked (2026-07-14 sweep) ---
  #
  # hqhq1025/skill-optimizer (132★) — skill lifecycle mining/audit/
  # generalization; strong concept but quiet since 2026-05-14. Revisit
  # next quarter if activity resumes.
  # ForgeAILab/forge (42★) — structured task-lifecycle workflow engine;
  # composable-timeline adjacent, still small.
  # ma08/botfiles (28★) — portable agent-ecosystem hooks/config.
  # Just-Agent/make-agents-cheaper (22★) — prompt-cache economics; tiny.
  # smtg-ai/claude-squad, ruvnet/ruflo — established orchestration
  # platforms; excluded per Tier-3 defer + STEELMAN reasoning.

