# Inspiration Tracker — Project Registry
#
# Tracked external projects for discovering portable enhancements and patterns.
# Managed by the /inspiration-tracker skill. Add entries here or use
# /inspiration-tracker add to add interactively.
#
# Two project types:
#   fork:        File-level diff for repos with shared structure
#   inspiration: Structured survey + changelog for unrelated projects

projects:
  ros2_agent_workspace:
    type: fork
    repo: rolker/ros2_agent_workspace
    description: Original ROS2 agent workspace this repo was forked from
    domain_patterns:
      - ros2
      - colcon
      - layer
      - overlay
      - gazebo
      - launch
    categories:
      - scripts
      - skills
      - adrs
      - templates
      - knowledge
      - makefile
      - config

  gstack:
    type: inspiration
    repo: garrytan/gstack
    description: Opinionated Claude Code skills framework with role-based slash commands
    # interest_areas tightened 2026-04-19: dropped browser-based QA
    # (gstack domain), de-emphasized release engineering (scale mismatch);
    # added session/context management + agent-user UX patterns to match
    # daddy_camp's current concerns
    interest_areas:
      - review and QA workflow (multi-role review, adversarial, anti-skip)
      - planning methodology (CEO/eng/design review roles, scope modes)
      - session and context management (/checkpoint, /health, context-save/restore, context rot defense)
      - agent-user UX patterns (CLI-friendly interaction, mode-posture preservation)
      - safety controls (/careful, /freeze, /guard hooks)
      - agent friction reporting (how agents surface workflow friction)

  superpowers:
    type: inspiration
    repo: obra/superpowers
    description: Agentic skills framework and software development methodology
    interest_areas:
      - skills architecture and composability
      - TDD methodology and testing patterns
      - subagent patterns and orchestration
      - development methodology and workflows

  agent-orchestrator:
    type: inspiration
    repo: ComposioHQ/agent-orchestrator
    description: Reference open-source orchestrator for parallel coding agents
    # Added 2026-04-19. Tracked despite our Tier 3 "Defer" decision —
    # the patterns (reaction system, adapter architecture, worktree-per-
    # agent discipline) inform how we'd adopt IF mechanical backlog
    # pressure ever makes Tier 3 worthwhile. Also the reference point
    # for the "additive-only" constraint (D5) — if they move toward less
    # intermediated designs, revisit.
    interest_areas:
      - reaction system (CI failures, review comments, PR approvals)
      - task decomposition patterns
      - adapter architecture (runtime/agent/workspace/tracker/notifier pluggability)
      - worktree-per-agent discipline (convergent with our own)
      - dashboard model for multi-agent oversight

  overstory:
    type: inspiration
    repo: jayminwest/overstory
    description: Multi-agent orchestrator with SQLite-backed messaging and watchdog daemon
    # Added 2026-04-19. Paired with agent-orchestrator to cover the
    # category from two angles — agent-orchestrator is the big/reference
    # implementation, Overstory explores different messaging tech
    # (SQLite-backed mailbox) and conflict-resolution patterns. Of
    # particular interest: watchdog daemon, which we're building
    # separately as a small bash helper per Row 7 decision.
    interest_areas:
      - inter-agent messaging (SQLite-backed mailbox)
      - conflict resolution (4-tier)
      - watchdog daemon patterns
      - multi-runtime agent support (Claude Code, Pi, Gemini CLI)

  # --- Archived sources (2026-04-19) ---
  #
  # The following entries were removed from active tracking after a signal-
  # to-noise review. Their digest files remain in .agent/knowledge/ with
  # an ARCHIVED header noting the date and reason. Re-add to `projects:`
  # above if motivation changes.
  #
  # gastown (steveyegge/gastown) — 100+ merges in 19 days but almost all
  # internal `gt` CLI tooling (stack-based git workflow, beads, polecats).
  # Domain has diverged from ours; our agent-coordination concerns aren't
  # what gastown iterates on anymore.
  #
  # microsoft-skills (microsoft/skills) — 20 of 23 merges in 19 days are
  # mechanical Azure plugin syncs. Low signal-to-noise for general skill
  # architecture learning.
